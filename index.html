<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INKFIND — Admin + App</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@700;900&family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── THEME VARIABLES (editable via admin) ── */
:root {
  --bg: #0a0a0d;
  --gold: #c9a96e;
  --text: #e8e4dc;
  --muted: rgba(232,228,220,0.4);
  --border: rgba(232,228,220,0.08);
  --surface: rgba(255,255,255,0.03);
  --faint: rgba(232,228,220,0.12);
  --logo-font: 'Cinzel', serif;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; }

/* ════════════════════════════════════
   LOGIN SCREEN
════════════════════════════════════ */
#loginScreen {
  position: fixed; inset: 0; z-index: 9999;
  background: #07070a;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.login-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(232,228,220,0.1);
  border-radius: 20px;
  padding: 40px 36px;
  width: 340px;
  text-align: center;
}
.login-logo { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 900; letter-spacing: .25em; margin-bottom: 6px; }
.login-logo span { color: #c9a96e; }
.login-sub { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(232,228,220,0.35); margin-bottom: 32px; }
.login-label { display: block; text-align: left; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: rgba(232,228,220,0.4); margin-bottom: 8px; }
.login-input {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(232,228,220,0.1); border-radius: 10px;
  padding: 12px 16px; color: #e8e4dc;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
  margin-bottom: 20px;
}
.login-input:focus { border-color: rgba(201,169,110,0.4); }
.login-btn {
  width: 100%; background: #c9a96e; border: none; border-radius: 10px;
  padding: 13px; color: #07070a;
  font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: .15em; font-weight: 700;
  cursor: pointer; transition: opacity .2s;
}
.login-btn:hover { opacity: .85; }
.login-err { font-size: 12px; color: #e05555; margin-top: 12px; display: none; }

/* ════════════════════════════════════
   ADMIN PANEL (slide-in drawer)
════════════════════════════════════ */
#adminDrawer {
  position: fixed; top: 0; right: -420px; bottom: 0;
  width: 400px; z-index: 800;
  background: #0d0d11;
  border-left: 1px solid rgba(232,228,220,0.1);
  display: flex; flex-direction: column;
  transition: right .4s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
#adminDrawer.open { right: 0; }

.admin-header {
  padding: 20px;
  border-bottom: 1px solid rgba(232,228,220,0.07);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.admin-title { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: .15em; color: #c9a96e; }
.admin-close {
  background: none; border: 1px solid rgba(232,228,220,0.12);
  border-radius: 8px; padding: 6px 12px;
  color: rgba(232,228,220,0.5); font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer;
}
.admin-close:hover { color: #e8e4dc; border-color: rgba(232,228,220,0.25); }

.admin-body { flex: 1; overflow-y: auto; padding: 20px; }
.admin-body::-webkit-scrollbar { width: 3px; }
.admin-body::-webkit-scrollbar-thumb { background: rgba(232,228,220,0.1); border-radius: 2px; }

.admin-section { margin-bottom: 28px; }
.admin-section-title {
  font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
  color: rgba(232,228,220,0.3); margin-bottom: 14px;
  padding-bottom: 8px; border-bottom: 1px solid rgba(232,228,220,0.05);
}

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; letter-spacing: .1em; color: rgba(232,228,220,0.5); margin-bottom: 6px; }
.field input[type="text"],
.field input[type="password"] {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(232,228,220,0.1); border-radius: 8px;
  padding: 10px 12px; color: #e8e4dc;
  font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
}
.field input:focus { border-color: rgba(201,169,110,0.35); }

/* Color picker row */
.color-row { display: flex; align-items: center; gap: 10px; }
.color-swatch {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15); cursor: pointer;
  flex-shrink: 0; overflow: hidden; padding: 0;
}
.color-swatch input[type="color"] { width: 200%; height: 200%; margin: -50%; border: none; cursor: pointer; }

/* Font selector */
.font-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.font-btn {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(232,228,220,0.1);
  border-radius: 8px; padding: 10px;
  color: rgba(232,228,220,0.6); font-size: 13px; cursor: pointer;
  transition: all .2s; text-align: center;
}
.font-btn:hover { border-color: rgba(201,169,110,0.3); color: #e8e4dc; }
.font-btn.on { border-color: #c9a96e; background: rgba(201,169,110,0.08); color: #c9a96e; }

/* Live preview */
.preview-box {
  background: #111115; border: 1px solid rgba(232,228,220,0.08);
  border-radius: 12px; padding: 16px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.preview-logo-wrap { display: flex; flex-direction: column; gap: 4px; }
.preview-logo { font-size: 20px; font-weight: 900; letter-spacing: .2em; transition: all .3s; }
.preview-city { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: rgba(232,228,220,0.35); }
.preview-btn-sample { border-radius: 8px; padding: 8px 16px; border: none; font-size: 12px; font-weight: 600; letter-spacing: .1em; cursor: default; transition: background .3s; }

/* Apply button */
.apply-btn {
  width: 100%; background: #c9a96e; border: none; border-radius: 10px;
  padding: 13px; color: #07070a;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .15em; font-weight: 700;
  cursor: pointer; transition: opacity .2s; margin-top: 8px;
}
.apply-btn:hover { opacity: .85; }
.apply-btn.secondary {
  background: none; border: 1px solid rgba(232,228,220,0.15);
  color: rgba(232,228,220,0.5); margin-top: 6px;
}
.apply-btn.secondary:hover { border-color: rgba(232,228,220,0.3); color: #e8e4dc; opacity: 1; }

.success-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a2e1a; border: 1px solid rgba(80,200,80,0.3);
  border-radius: 100px; padding: 10px 24px;
  font-size: 13px; color: #80d880; z-index: 9000;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
.success-toast.show { opacity: 1; }

/* ════════════════════════════════════
   MAIN APP NAV
════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 700;
  height: 56px;
  background: rgba(10,10,13,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  transition: right .4s;
}
.logo { font-family: var(--logo-font); font-size: 17px; font-weight: 900; letter-spacing: .2em; transition: all .3s; }
.logo span { color: var(--gold); transition: color .3s; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-city { font-size: 11px; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; }
.admin-trigger {
  background: rgba(201,169,110,0.08); border: 1px solid rgba(201,169,110,0.2);
  border-radius: 8px; padding: 6px 12px;
  color: #c9a96e; font-family: 'DM Sans', sans-serif;
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; transition: all .2s;
}
.admin-trigger:hover { background: rgba(201,169,110,0.15); }
.nav-back { background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; display: none; align-items: center; gap: 6px; }
.nav-back:hover { color: var(--text); }

/* ════════════════════════════════════
   APP SHELL
════════════════════════════════════ */
.shell { position: fixed; inset: 56px 0 0 0; display: flex; transition: right .4s; }
.panel {
  width: 380px; flex-shrink: 0;
  background: var(--bg); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-inner { flex: 1; overflow-y: auto; padding: 20px; }
.panel-inner::-webkit-scrollbar { width: 4px; }
.panel-inner::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }
#map { flex: 1; }

/* Leaflet */
.leaflet-container { background: #111114 !important; }
.leaflet-tile { filter: brightness(0.45) saturate(0.3) hue-rotate(200deg); }
.leaflet-control-zoom a { background: #1a1a1f !important; color: var(--gold) !important; border-color: var(--border) !important; }
.ink-marker { width: 36px; height: 36px; background: var(--gold); border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid #0a0a0d; cursor: pointer; box-shadow: 0 4px 16px rgba(201,169,110,0.5); transition: transform .2s; }
.ink-marker.active { background: #fff; transform: rotate(-45deg) scale(1.25); }
.ink-marker-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform: rotate(45deg); font-size: 14px; }
.leaflet-popup-content-wrapper { background: #1a1a1f; border: 1px solid var(--border); border-radius: 12px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.6); }
.leaflet-popup-tip { background: #1a1a1f; }
.leaflet-popup-content { margin: 14px 16px; font-family: 'DM Sans', sans-serif; }
.popup-name { font-family: var(--logo-font); font-size: 14px; margin-bottom: 4px; }
.popup-loc { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.popup-btn { background: var(--gold); border: none; border-radius: 7px; padding: 7px 14px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .1em; color: #0a0a0d; cursor: pointer; transition: opacity .2s; }
.popup-btn:hover { opacity: .85; }

/* Search / filters */
.search-box { position: relative; margin-bottom: 14px; }
.search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px 11px 38px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
.search-input:focus { border-color: rgba(201,169,110,0.35); }
.search-input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.chip { background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 5px 13px; font-size: 11px; color: var(--muted); cursor: pointer; transition: all .2s; white-space: nowrap; }
.chip:hover { color: var(--text); border-color: var(--faint); }
.chip.on { background: rgba(201,169,110,0.12); border-color: var(--gold); color: var(--gold); }

/* AI */
.ai-section { background: linear-gradient(135deg,rgba(201,169,110,0.06),rgba(201,169,110,0.02)); border: 1px solid rgba(201,169,110,0.18); border-radius: 14px; padding: 16px; margin-bottom: 22px; }
.ai-tag { font-size: 10px; letter-spacing: .3em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.ai-row { display: flex; gap: 8px; }
.ai-input { flex: 1; background: rgba(0,0,0,.3); border: 1px solid rgba(232,228,220,.1); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
.ai-input:focus { border-color: rgba(201,169,110,.3); }
.ai-input::placeholder { color: var(--muted); }
.ai-btn { background: var(--gold); border: none; border-radius: 8px; padding: 10px 16px; color: #0a0a0d; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .1em; cursor: pointer; transition: opacity .2s; white-space: nowrap; }
.ai-btn:hover { opacity: .85; }
.ai-btn:disabled { opacity: .35; cursor: default; }
.ai-response { margin-top: 12px; font-size: 12px; color: rgba(232,228,220,.65); line-height: 1.7; border-top: 1px solid rgba(232,228,220,.07); padding-top: 12px; }
.dot-row { display: flex; gap: 4px; align-items: center; margin-top: 12px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: pulse 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* Studio cards */
.section-label { font-size: 10px; letter-spacing: .3em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.studio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; cursor: pointer; transition: all .25s; overflow: hidden; }
.studio-card:hover { border-color: rgba(232,228,220,.18); transform: translateX(3px); }
.studio-card.active { border-color: var(--gold); background: rgba(201,169,110,.05); }
.studio-cover { height: 70px; display: flex; align-items: flex-end; padding: 10px 14px; }
.dist-badge { font-size: 10px; letter-spacing: .12em; background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.12); border-radius: 100px; padding: 3px 10px; color: rgba(255,255,255,.75); }
.studio-body { padding: 14px; }
.studio-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.studio-name { font-family: var(--logo-font); font-size: 15px; font-weight: 600; }
.studio-rating { font-size: 12px; color: var(--gold); }
.studio-loc { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.studio-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.style-tag { font-size: 10px; border: 1px solid var(--border); border-radius: 100px; padding: 3px 10px; color: var(--muted); }

/* Detail */
.detail { display: none; flex-direction: column; height: 100%; }
.detail.show { display: flex; }
.detail-scroll { flex: 1; overflow-y: auto; padding: 20px; }
.detail-scroll::-webkit-scrollbar { width: 4px; }
.detail-scroll::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }
.artist-grid { display: grid; gap: 10px; }
.artist-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; gap: 14px; align-items: flex-start; cursor: pointer; transition: all .2s; }
.artist-card:hover { border-color: rgba(201,169,110,.3); }
.avatar { width: 52px; height: 52px; flex-shrink: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--logo-font); font-size: 18px; border: 1px solid rgba(255,255,255,.1); }
.a-name { font-family: var(--logo-font); font-size: 14px; margin-bottom: 3px; }
.a-spec { font-size: 11px; color: var(--gold); margin-bottom: 6px; }
.a-bio { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
.a-footer { display: flex; justify-content: space-between; align-items: center; }
.a-rate { font-size: 13px; font-weight: 500; }
.btn-sm { background: none; border: 1px solid rgba(201,169,110,.35); border-radius: 7px; padding: 6px 14px; color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .2s; }
.btn-sm:hover { background: rgba(201,169,110,.1); }
.port-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 22px; }
.port-tile { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid rgba(255,255,255,.05); }
.slots { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 20px; }
.slot { border: 1px solid var(--border); border-radius: 8px; padding: 10px 6px; background: var(--surface); color: var(--muted); font-size: 12px; text-align: center; cursor: pointer; transition: all .2s; }
.slot:hover { border-color: rgba(201,169,110,.3); color: var(--text); }
.slot.on { background: rgba(201,169,110,.12); border-color: var(--gold); color: var(--gold); }
.f-label { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 8px; }
textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; resize: none; outline: none; line-height: 1.6; margin-bottom: 20px; }
textarea:focus { border-color: rgba(201,169,110,.3); }
.btn-primary { width: 100%; background: var(--gold); border: none; border-radius: 11px; padding: 14px; color: #0a0a0d; font-family: var(--logo-font); font-size: 13px; letter-spacing: .15em; font-weight: 700; cursor: pointer; transition: opacity .2s; }
.btn-primary:disabled { opacity: .3; cursor: default; }
.btn-primary:not(:disabled):hover { opacity: .87; }
.confirm-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; flex: 1; }
.confirm-icon { width: 72px; height: 72px; border: 1px solid rgba(201,169,110,.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 20px; }
.confirm-title { font-family: var(--logo-font); font-size: 24px; margin-bottom: 10px; }
.confirm-sub { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
.confirm-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: left; margin-bottom: 24px; }
.confirm-row { display: flex; justify-content: space-between; font-size: 12px; padding: 7px 0; border-bottom: 1px solid rgba(232,228,220,.05); }
.confirm-row:last-child { border-bottom: none; }
.cr-label { color: var(--muted); }

/* Overlay when admin open */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 750; display: none; }
.overlay.show { display: block; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">INK<span>FIND</span></div>
    <div class="login-sub">Admin Access</div>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="pwInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')tryLogin()"/>
    <button class="login-btn" onclick="tryLogin()">Enter Admin</button>
    <div class="login-err" id="loginErr">Wrong password. Try: <strong>admin123</strong></div>
    <div style="margin-top:20px;font-size:11px;color:rgba(232,228,220,0.2)">Or <span style="color:rgba(201,169,110,0.6);cursor:pointer" onclick="skipLogin()">view app without admin →</span></div>
  </div>
</div>

<!-- ── OVERLAY ── -->
<div class="overlay" id="overlay" onclick="closeAdmin()"></div>

<!-- ── ADMIN DRAWER ── -->
<div id="adminDrawer">
  <div class="admin-header">
    <div class="admin-title">⚙ Brand Settings</div>
    <button class="admin-close" onclick="closeAdmin()">✕ Close</button>
  </div>
  <div class="admin-body">

    <!-- Live Preview -->
    <div class="admin-section">
      <div class="admin-section-title">Live Preview</div>
      <div class="preview-box">
        <div class="preview-logo-wrap">
          <div class="preview-logo" id="previewLogo">INK<span id="previewLogoSpan" style="color:#c9a96e">FIND</span></div>
          <div class="preview-city" id="previewCity">BLR</div>
        </div>
        <button class="preview-btn-sample" id="previewBtn" style="background:#c9a96e;color:#0a0a0d;font-family:'Cinzel',serif;letter-spacing:.1em">Book Now</button>
      </div>
    </div>

    <!-- Logo Text -->
    <div class="admin-section">
      <div class="admin-section-title">Logo & Name</div>
      <div class="field">
        <label>Logo First Word</label>
        <input type="text" id="logoA" value="INK" oninput="livePreview()"/>
      </div>
      <div class="field">
        <label>Logo Second Word (shown in accent colour)</label>
        <input type="text" id="logoB" value="FIND" oninput="livePreview()"/>
      </div>
      <div class="field">
        <label>City Label (top right)</label>
        <input type="text" id="cityLabel" value="BLR" oninput="livePreview()"/>
      </div>
    </div>

    <!-- Colours -->
    <div class="admin-section">
      <div class="admin-section-title">Colours</div>

      <div class="field">
        <label>Accent / Brand Colour</label>
        <div class="color-row">
          <div class="color-swatch" id="swatchGold" style="background:#c9a96e">
            <input type="color" value="#c9a96e" id="colorGold" oninput="livePreview()"/>
          </div>
          <input type="text" id="colorGoldHex" value="#c9a96e" oninput="syncColorFromHex('colorGold','colorGoldHex','swatchGold')" style="flex:1"/>
        </div>
      </div>

      <div class="field">
        <label>Background Colour</label>
        <div class="color-row">
          <div class="color-swatch" id="swatchBg" style="background:#0a0a0d">
            <input type="color" value="#0a0a0d" id="colorBg" oninput="livePreview()"/>
          </div>
          <input type="text" id="colorBgHex" value="#0a0a0d" oninput="syncColorFromHex('colorBg','colorBgHex','swatchBg')" style="flex:1"/>
        </div>
      </div>

      <div class="field">
        <label>Text Colour</label>
        <div class="color-row">
          <div class="color-swatch" id="swatchText" style="background:#e8e4dc">
            <input type="color" value="#e8e4dc" id="colorText" oninput="livePreview()"/>
          </div>
          <input type="text" id="colorTextHex" value="#e8e4dc" oninput="syncColorFromHex('colorText','colorTextHex','swatchText')" style="flex:1"/>
        </div>
      </div>
    </div>

    <!-- Font -->
    <div class="admin-section">
      <div class="admin-section-title">Logo Font</div>
      <div class="font-grid" id="fontGrid">
        <button class="font-btn on" style="font-family:'Cinzel',serif" onclick="pickFont('Cinzel, serif',this)">Cinzel</button>
        <button class="font-btn" style="font-family:'Playfair Display',serif" onclick="pickFont('Playfair Display, serif',this)">Playfair</button>
        <button class="font-btn" style="font-family:'Syne',sans-serif" onclick="pickFont('Syne, sans-serif',this)">Syne</button>
        <button class="font-btn" style="font-family:'Space Mono',monospace" onclick="pickFont('Space Mono, monospace',this)">Mono</button>
        <button class="font-btn" style="font-family:'Cormorant Garamond',serif" onclick="pickFont('Cormorant Garamond, serif',this)">Cormorant</button>
        <button class="font-btn" style="font-family:'DM Sans',sans-serif" onclick="pickFont('DM Sans, sans-serif',this)">DM Sans</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="admin-section">
      <div class="admin-section-title">Actions</div>
      <button class="apply-btn" onclick="applyChanges()">✓ Apply to App</button>
      <button class="apply-btn secondary" onclick="resetDefaults()">↺ Reset to Defaults</button>
    </div>

  </div>
</div>

<!-- ── TOAST ── -->
<div class="success-toast" id="toast">✓ Changes applied to app!</div>

<!-- ── NAV ── -->
<nav id="mainNav">
  <button class="nav-back" id="navBack" onclick="goBack()">← Back</button>
  <div class="logo" id="appLogo">INK<span id="appLogoSpan">FIND</span></div>
  <div class="nav-right">
    <div class="nav-city" id="appCity">BLR</div>
    <button class="admin-trigger" id="adminTrigger" onclick="openAdmin()" style="display:none">⚙ Admin</button>
  </div>
</nav>

<!-- ── APP SHELL ── -->
<div class="shell">
  <div class="panel">
    <!-- HOME -->
    <div id="homeView" class="panel-inner">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="searchInput" placeholder="Search studios or styles…" oninput="renderStudios()"/>
      </div>
      <div class="chips" id="chips"></div>
      <div class="ai-section">
        <div class="ai-tag">✦ &nbsp;AI Style Guide</div>
        <div class="ai-row">
          <input class="ai-input" id="aiInput" placeholder="Describe your tattoo idea…"/>
          <button class="ai-btn" id="aiBtn" onclick="askAI()">Ask</button>
        </div>
        <div id="aiThink" class="dot-row" style="display:none"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div id="aiOut" class="ai-response" style="display:none"></div>
      </div>
      <div class="section-label">Studios Near You</div>
      <div id="studioList"></div>
    </div>

    <!-- PARLOUR -->
    <div id="parlourView" class="detail">
      <div class="detail-scroll" id="parlourScroll"></div>
    </div>

    <!-- ARTIST -->
    <div id="artistView" class="detail">
      <div class="detail-scroll" id="artistScroll"></div>
    </div>

    <!-- CONFIRM -->
    <div id="confirmView" class="detail">
      <div class="confirm-wrap" id="confirmWrap"></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<!-- ══════════════════════════════════════════════ SCRIPT ══════════════════════════════════════════════ -->
<script>

/* ── DATA ── */
const STUDIOS = [
  { id:1, name:"Black Lotus Studio", area:"Indiranagar", lat:12.9784, lng:77.6408, rating:4.9, reviews:214, styles:["Blackwork","Fine Line","Geometric"], cover:["#1a1a2e","#2d1b4e"],
    artists:[
      { id:1, name:"Arjun Mehta", spec:"Blackwork & Geometric", rate:"₹3,500/hr", bio:"10 years crafting bold blackwork. Influenced by sacred geometry and South Indian temple art.", slots:["Mon 2pm","Wed 11am","Fri 3pm"], colors:["#1a1a2e","#2d2d44","#3d3d5c"], icons:["◆","△","◉","✦","◆","△"] },
      { id:2, name:"Priya Nair", spec:"Fine Line & Botanical", rate:"₹4,000/hr", bio:"Delicate fine-line work inspired by Indian flora. Trained in Seoul and Mumbai.", slots:["Tue 10am","Thu 2pm","Sat 12pm"], colors:["#2d1b1b","#4a2828","#6b3b3b"], icons:["❧","━","◌","❧","━","◌"] },
    ]},
  { id:2, name:"Ink & Iron", area:"Koramangala", lat:12.9352, lng:77.6245, rating:4.7, reviews:189, styles:["Japanese","Neo-Traditional","Realism"], cover:["#0d1b0d","#1a3320"],
    artists:[
      { id:3, name:"Rohan Das", spec:"Japanese Traditional", rate:"₹5,000/hr", bio:"Apprenticed under a master in Kyoto. Brings Japanese storytelling to every piece.", slots:["Mon 11am","Wed 3pm","Sat 10am"], colors:["#0d1b0d","#1a3320","#254d2e"], icons:["⛩","✦","◉","⛩","✦","◉"] },
    ]},
  { id:3, name:"Chromatic Skin", area:"Jayanagar", lat:12.9250, lng:77.5938, rating:4.8, reviews:302, styles:["Watercolour","Illustrative","Surrealism"], cover:["#1a0a2e","#2d1a4a"],
    artists:[
      { id:4, name:"Sneha Rao", spec:"Watercolour & Surrealism", rate:"₹4,500/hr", bio:"Fine arts background. Creates dreamlike compositions that blur skin and canvas.", slots:["Tue 1pm","Thu 11am","Fri 4pm"], colors:["#1a0a2e","#2d1a4a","#3f2566"], icons:["◌","✿","◎","◌","✿","◎"] },
    ]},
  { id:4, name:"Needle & Thread", area:"HSR Layout", lat:12.9116, lng:77.6389, rating:4.6, reviews:97, styles:["Minimalist","Script","Dotwork"], cover:["#1a1a14","#2d2d1f"],
    artists:[
      { id:5, name:"Kavitha Shetty", spec:"Minimalist & Script", rate:"₹2,800/hr", bio:"Clean lines, intentional space. Every tattoo says exactly what it needs to — nothing more.", slots:["Mon 3pm","Thu 12pm","Sat 2pm"], colors:["#1a1a14","#2d2d1f","#3f3f2a"], icons:["━","◌","·","━","◌","·"] },
    ]},
  { id:5, name:"Sacred Skin", area:"Whitefield", lat:12.9698, lng:77.7499, rating:4.8, reviews:156, styles:["Mandala","Spiritual","Ornamental"], cover:["#1a0d00","#2d1a00"],
    artists:[
      { id:6, name:"Dev Krishnan", spec:"Mandala & Ornamental", rate:"₹4,200/hr", bio:"Deeply rooted in South Asian spiritual art. Each mandala is a meditation made permanent.", slots:["Wed 10am","Fri 1pm","Sat 11am"], colors:["#1a0d00","#2d1a00","#4a2e00"], icons:["◎","✦","◆","◎","✦","◆"] },
    ]},
];

const ALL_STYLES = [...new Set(STUDIOS.flatMap(s=>s.styles))];
let state = { active:null, artist:null, slot:null, filter:null, view:'home', markers:{}, isAdmin:false, font:'Cinzel, serif' };
let pendingFont = 'Cinzel, serif';

/* ── LOGIN ── */
function tryLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === 'admin123') {
    state.isAdmin = true;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminTrigger').style.display = 'flex';
    initApp();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function skipLogin() {
  document.getElementById('loginScreen').style.display = 'none';
  initApp();
}

/* ── ADMIN ── */
function openAdmin() {
  document.getElementById('adminDrawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeAdmin() {
  document.getElementById('adminDrawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function livePreview() {
  const a = document.getElementById('logoA').value || 'INK';
  const b = document.getElementById('logoB').value || 'FIND';
  const city = document.getElementById('cityLabel').value || 'BLR';
  const gold = document.getElementById('colorGold').value;
  const bg = document.getElementById('colorBg').value;
  const text = document.getElementById('colorText').value;

  document.getElementById('previewLogo').childNodes[0].textContent = a;
  document.getElementById('previewLogoSpan').textContent = b;
  document.getElementById('previewLogoSpan').style.color = gold;
  document.getElementById('previewCity').textContent = city;
  document.getElementById('previewBtn').style.background = gold;
  document.getElementById('previewBtn').style.color = bg;
  document.getElementById('previewLogo').style.fontFamily = pendingFont;

  document.getElementById('colorGoldHex').value = gold;
  document.getElementById('colorBgHex').value = bg;
  document.getElementById('colorTextHex').value = text;
  document.getElementById('swatchGold').style.background = gold;
  document.getElementById('swatchBg').style.background = bg;
  document.getElementById('swatchText').style.background = text;
}

function syncColorFromHex(colorId, hexId, swatchId) {
  const hex = document.getElementById(hexId).value;
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    document.getElementById(colorId).value = hex;
    document.getElementById(swatchId).style.background = hex;
    livePreview();
  }
}

function pickFont(font, el) {
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  pendingFont = font;
  document.getElementById('previewLogo').style.fontFamily = font;
}

function applyChanges() {
  const gold = document.getElementById('colorGold').value;
  const bg = document.getElementById('colorBg').value;
  const text = document.getElementById('colorText').value;
  const a = document.getElementById('logoA').value || 'INK';
  const b = document.getElementById('logoB').value || 'FIND';
  const city = document.getElementById('cityLabel').value || 'BLR';

  const root = document.documentElement;
  root.style.setProperty('--gold', gold);
  root.style.setProperty('--bg', bg);
  root.style.setProperty('--text', text);
  root.style.setProperty('--logo-font', pendingFont);
  state.font = pendingFont;

  document.getElementById('appLogo').childNodes[0].textContent = a;
  document.getElementById('appLogoSpan').textContent = b;
  document.getElementById('appCity').textContent = city;

  closeAdmin();
  showToast('✓ Changes applied to app!');
}

function resetDefaults() {
  document.getElementById('logoA').value = 'INK';
  document.getElementById('logoB').value = 'FIND';
  document.getElementById('cityLabel').value = 'BLR';
  document.getElementById('colorGold').value = '#c9a96e';
  document.getElementById('colorBg').value = '#0a0a0d';
  document.getElementById('colorText').value = '#e8e4dc';
  pendingFont = 'Cinzel, serif';
  document.querySelectorAll('.font-btn').forEach((b,i)=>{ b.classList.toggle('on', i===0); });
  livePreview();
  applyChanges();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

/* ── MAP ── */
let map;
function initMap() {
  map = L.map('map', { center:[12.9352,77.6245], zoom:13, zoomControl:true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(map);
  STUDIOS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'ink-marker';
    el.innerHTML = '<div class="ink-marker-inner">✦</div>';
    const icon = L.divIcon({ html:el.outerHTML, className:'', iconSize:[36,36], iconAnchor:[18,36] });
    const m = L.marker([s.lat, s.lng], {icon}).addTo(map)
      .bindPopup(`<div class="popup-name">${s.name}</div><div class="popup-loc">📍 ${s.area} · ⭐ ${s.rating}</div><button class="popup-btn" onclick="openStudio(${s.id})">View Studio →</button>`);
    m.on('click', () => {
      Object.values(state.markers).forEach(mk => mk._icon?.querySelector('.ink-marker')?.classList.remove('active'));
      m._icon?.querySelector('.ink-marker')?.classList.add('active');
    });
    state.markers[s.id] = m;
  });
}

/* ── BUILD UI ── */
function buildHome() {
  const c = document.getElementById('chips');
  c.innerHTML = `<button class="chip on" onclick="setFilter('all',this)">All</button>`;
  ALL_STYLES.forEach(s => { c.innerHTML += `<button class="chip" onclick="setFilter('${s}',this)">${s}</button>`; });
  renderStudios();
}

function dist(s) {
  const d = Math.sqrt(Math.pow((s.lat-12.9716)*111,2)+Math.pow((s.lng-77.5946)*85,2));
  return `${d.toFixed(1)} km`;
}

function renderStudios() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = STUDIOS.filter(s => {
    const ms = !state.filter || s.styles.includes(state.filter);
    const mq = !q || s.name.toLowerCase().includes(q) || s.area.toLowerCase().includes(q) || s.styles.some(t=>t.toLowerCase().includes(q));
    return ms && mq;
  });
  STUDIOS.forEach(s => { const m=state.markers[s.id]; if(!m)return; filtered.find(f=>f.id===s.id)?(!map.hasLayer(m)&&m.addTo(map)):(map.hasLayer(m)&&map.removeLayer(m)); });
  const list = document.getElementById('studioList');
  list.innerHTML = '';
  if (!filtered.length) { list.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:30px 0">No studios match.</div>'; return; }
  filtered.forEach(s => {
    const d = document.createElement('div');
    d.className = `studio-card${state.active?.id===s.id?' active':''}`;
    d.id = `sc-${s.id}`;
    d.innerHTML = `
      <div class="studio-cover" style="background:linear-gradient(135deg,${s.cover[0]},${s.cover[1]})"><div class="dist-badge">${dist(s)} away</div></div>
      <div class="studio-body">
        <div class="studio-row"><div class="studio-name">${s.name}</div><div class="studio-rating">⭐ ${s.rating}</div></div>
        <div class="studio-loc">📍 ${s.area} · ${s.reviews} reviews</div>
        <div class="studio-tags">${s.styles.map(t=>`<span class="style-tag">${t}</span>`).join('')}</div>
      </div>`;
    d.onclick = () => openStudio(s.id);
    list.appendChild(d);
  });
}

function setFilter(sty, el) {
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  state.filter = sty==='all'?null:sty;
  renderStudios();
}

/* ── STUDIO ── */
function openStudio(id) {
  const s = STUDIOS.find(x=>x.id===id);
  state.active = s; state.view = 'parlour';
  map.flyTo([s.lat, s.lng], 15, {duration:1.2});
  state.markers[s.id].openPopup();
  document.querySelectorAll('.studio-card').forEach(c=>c.classList.remove('active'));
  document.getElementById(`sc-${s.id}`)?.classList.add('active');
  document.getElementById('parlourScroll').innerHTML = `
    <div style="height:120px;background:linear-gradient(135deg,${s.cover[0]},${s.cover[1]});border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;border:1px solid rgba(255,255,255,.06)">✦</div>
    <h2 style="font-family:var(--logo-font);font-size:22px;margin-bottom:6px">${s.name}</h2>
    <div style="font-size:12px;color:var(--muted);display:flex;gap:14px;margin-bottom:26px"><span>⭐ ${s.rating} (${s.reviews})</span><span>📍 ${s.area}</span><span>🚶 ${dist(s)}</span></div>
    <div class="section-label">Artists</div>
    <div class="artist-grid">${s.artists.map(a=>`
      <div class="artist-card" onclick="openArtist(${s.id},${a.id})">
        <div class="avatar" style="background:linear-gradient(135deg,${a.colors[0]},${a.colors[2]})">${a.name[0]}</div>
        <div style="flex:1">
          <div class="a-name">${a.name}</div><div class="a-spec">${a.spec}</div>
          <div class="a-bio">${a.bio}</div>
          <div class="a-footer"><span class="a-rate">${a.rate}</span><button class="btn-sm" onclick="event.stopPropagation();openArtist(${s.id},${a.id})">Book</button></div>
        </div>
      </div>`).join('')}</div>`;
  showView('parlourView');
}

/* ── ARTIST ── */
function openArtist(sid, aid) {
  const s = STUDIOS.find(x=>x.id===sid);
  const a = s.artists.find(x=>x.id===aid);
  state.active=s; state.artist=a; state.slot=null; state.view='artist';
  const tileStyles = (ic,i) => {
    const pairs=[`${a.colors[0]},${a.colors[1]}`,`${a.colors[1]},${a.colors[2]}`,`${a.colors[2]},${a.colors[0]}`];
    return `background:linear-gradient(135deg,${pairs[i%3]})`;
  };
  document.getElementById('artistScroll').innerHTML = `
    <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:24px">
      <div class="avatar" style="width:72px;height:72px;font-size:26px;background:linear-gradient(135deg,${a.colors[0]},${a.colors[2]})">${a.name[0]}</div>
      <div><h2 style="font-family:var(--logo-font);font-size:20px;margin-bottom:4px">${a.name}</h2><div style="font-size:12px;color:var(--gold);margin-bottom:8px">${a.spec}</div><div style="font-size:12px;color:var(--muted);line-height:1.65">${a.bio}</div></div>
    </div>
    <div class="section-label" style="margin-bottom:10px">Portfolio</div>
    <div class="port-grid">${a.icons.map((ic,i)=>`<div class="port-tile" style="${tileStyles(ic,i)}">${ic}</div>`).join('')}</div>
    <div class="section-label" style="margin-bottom:10px">Available Slots</div>
    <div class="slots" id="slots">${a.slots.map(sl=>`<div class="slot" onclick="pickSlot('${sl}',this)">${sl}</div>`).join('')}</div>
    <label class="f-label">Your Tattoo Idea</label>
    <textarea rows="4" placeholder="Describe your idea — placement, size, references…" oninput="state.note=this.value"></textarea>
    <button class="btn-primary" id="bookBtn" disabled onclick="confirmBooking()">Confirm Booking</button>`;
  showView('artistView');
}

function pickSlot(slot, el) {
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('on'));
  el.classList.add('on'); state.slot=slot;
  document.getElementById('bookBtn').disabled=false;
}

function confirmBooking() {
  const s=state.active, a=state.artist;
  document.getElementById('confirmWrap').innerHTML=`
    <div class="confirm-icon">✦</div>
    <div class="confirm-title">Booking Confirmed!</div>
    <div class="confirm-sub">Your request has been sent to ${a.name}.<br>They'll confirm within 24 hours.</div>
    <div class="confirm-card">
      ${[["Studio",s.name],["Artist",a.name],["Slot",state.slot],["Rate",a.rate]].map(([l,v])=>`<div class="confirm-row"><span class="cr-label">${l}</span><span>${v}</span></div>`).join('')}
    </div>
    <button class="btn-primary" onclick="resetHome()">← Explore More</button>`;
  showView('confirmView');
}

function resetHome() {
  state.active=null; state.artist=null; state.slot=null;
  map.flyTo([12.9352,77.6245],13,{duration:1});
  showView('homeView'); renderStudios();
}

/* ── VIEWS ── */
const VIEWS=['homeView','parlourView','artistView','confirmView'];
function showView(id) {
  VIEWS.forEach(v=>{
    const el=document.getElementById(v);
    el.style.display = v===id ? 'flex' : 'none';
    el.classList.toggle('show', v===id);
  });
  document.getElementById('navBack').style.display = id==='homeView'?'none':'flex';
}
function goBack() {
  if(state.view==='confirm'){ openArtist(state.active.id,state.artist.id); return; }
  if(state.view==='artist'){ openStudio(state.active.id); return; }
  resetHome();
}

/* ── AI ── */
async function askAI() {
  const q = document.getElementById('aiInput').value.trim();
  if (!q) return;
  document.getElementById('aiBtn').disabled=true;
  document.getElementById('aiThink').style.display='flex';
  document.getElementById('aiOut').style.display='none';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000,
        system:`You are a tattoo style consultant for a booking platform in Bengaluru. Help customers find the right style and studio. Studios: Black Lotus Studio (Blackwork, Fine Line, Geometric - Indiranagar), Ink & Iron (Japanese, Neo-Traditional, Realism - Koramangala), Chromatic Skin (Watercolour, Illustrative, Surrealism - Jayanagar), Needle & Thread (Minimalist, Script, Dotwork - HSR Layout), Sacred Skin (Mandala, Spiritual, Ornamental - Whitefield). Be warm, specific, max 3 sentences.`,
        messages:[{role:'user',content:q}] })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text||'Sorry, try again!';
    document.getElementById('aiOut').textContent=text;
    document.getElementById('aiOut').style.display='block';
  } catch { document.getElementById('aiOut').textContent='Connection error — try again.'; document.getElementById('aiOut').style.display='block'; }
  document.getElementById('aiThink').style.display='none';
  document.getElementById('aiBtn').disabled=false;
}
document.getElementById('aiInput').addEventListener('keydown',e=>{ if(e.key==='Enter') askAI(); });

/* ── INIT ── */
function initApp() {
  initMap();
  buildHome();
  showView('homeView');
}

window.openStudio = openStudio;
window.tryLogin = tryLogin;
window.skipLogin = skipLogin;
</script>
</body>
</html>
